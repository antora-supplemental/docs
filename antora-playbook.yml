# Antora Supplemental documentation site
# Aggregates antora-supplemental org repos (Root Strategy)

site:
  title: Antora Supplemental
  start_page: docs:ROOT:index.adoc
content:
  sources:
    - url: https://github.com/antora-supplemental/antora-demo-template.git
      branches: [main, master]
      start_path: docs
    - url: https://github.com/antora-supplemental/antora-extensions-registry.git
      branches: [main, master]
      start_path: docs
    - url: https://github.com/antora-supplemental/antora-themes-site.git
      branches: [main, master]
      start_path: docs
    - url: https://github.com/antora-supplemental/dprint-plugin-asciidoc.git
      branches: [main, master]
      start_path: docs
    - url: https://github.com/antora-supplemental/asciidoc-interactive.git
      branches: [main, master]
      start_path: docs
    - url: .
      branches: HEAD
      start_path: docs
      worktrees: true
ui:
  bundle:
    url: https://github.com/antora-supplemental/antora-dark-theme/releases/latest/download/ui-bundle.zip
    snapshot: true
  supplemental_files: ./supplemental-ui
output:
  dir: ./build/site

asciidoc:
  attributes:
    source-highlighter: highlight.js
    icons: font
  extensions:
    - ./node_modules/@antora-supplemental/instruction-flow/lib/instruction-flow-extension.js
